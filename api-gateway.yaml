server:
  port: 8081

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**

        - id: cart-service
          uri: lb://cart-service
          predicates:
            - Path=/carts/**

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/products/**


management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always
      show-components: always

  metrics:
    enable:
      all: true

  info:
    env:
      enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/